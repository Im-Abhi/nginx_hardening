user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------
    # GLOBAL SETTINGS & PREREQUISITES
    # ---------------------------------------------------------

    # CIS 5.2.4 & 5.2.5: Shared memory zones defined globally
    limit_conn_zone $binary_remote_addr zone=limitperip:10m;
    limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=5r/s;

    # CIS 5.2.1: Global timeouts set to NGINX defaults (VULNERABLE)
    # The script should flag these unless overridden in a server block.
    client_body_timeout 60;
    client_header_timeout 60;


    # ---------------------------------------------------------
    # SERVER 1: THE CATCH-ALL (CIS 2.4.2)
    # ---------------------------------------------------------
    # EXPECTED RESULT: Passes CIS 2.4.2 default_server check.
    server {
        listen 80 default_server;
        server_name _;
        return 444;
    }


    # ---------------------------------------------------------
    # SERVER 2: THE "GOLD STANDARD" APP
    # ---------------------------------------------------------
    # EXPECTED RESULT: Total silence. All scripts return 0.
    server {
        listen 443;
        server_name secure.enterprise.com;

        autoindex off;                                 # CIS 2.1.4: Pass
        client_body_timeout 10;                        # CIS 5.2.1: Pass
        client_header_timeout 10;                      # CIS 5.2.1: Pass
        client_max_body_size 10m;                      # CIS 5.2.2: Pass

        limit_conn limitperip 10;                      # CIS 5.2.4: Pass
        limit_req zone=ratelimit burst=10 nodelay;     # CIS 5.2.5: Pass

        add_header X-Frame-Options "SAMEORIGIN" always;                        # CIS 5.3.1: Pass
        add_header X-Content-Type-Options "nosniff" always;                    # CIS 5.3.2: Pass
        add_header Content-Security-Policy "default-src 'self'" always;        # CIS 5.3.3: Pass
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;   # CIS 5.3.4: Pass

        location / {
            return 200 "Secure OK";
        }
    }


    # ---------------------------------------------------------
    # SERVER 3: THE "DEVELOPER SANDBOX" (REAL-WORLD MISTAKES)
    # ---------------------------------------------------------
    # EXPECTED RESULT: Massive failure across almost all scripts.
    server {
        listen 8080;

        # CIS 2.4.2: Fails (Missing 'server_name' entirely)

        # CIS 2.1.4: Fails (Explicitly enabled)
        autoindex on;

        # CIS 5.2.1: Fails (Overrides global with bad values)
        client_body_timeout 30s;
        client_header_timeout 50;

        # CIS 5.2.4 & 5.2.5: Fails (limit_conn and limit_req are missing)

        # CIS 5.3.1: Fails (Insecure policy, missing 'always')
        add_header X-Frame-Options "ALLOW-FROM https://partner.com";

        # CIS 5.3.2: Fails (Valid policy, but missing 'always' parameter)
        add_header X-Content-Type-Options "nosniff";

        # CIS 5.3.3: Fails & Warns (Missing 'always', uses unsafe-inline/eval)
        add_header Content-Security-Policy "default-src *; script-src 'unsafe-inline' 'unsafe-eval'";

        # CIS 5.3.4: Fails (Explicitly leaking policy triggers the 'unsafe-url' hard error)
        add_header Referrer-Policy "unsafe-url" always;
    }


    # ---------------------------------------------------------
    # SERVER 4: THE "FORMATTING NIGHTMARE" (EDGE CASES)
    # ---------------------------------------------------------
    # EXPECTED RESULT: Tests our AWK normalization and regex boundaries.
    server {
        listen 8081;
        server_name sloppy.enterprise.com;

        # CIS 2.1.4: Fails (Tests weird spacing, quotes, and uppercase)
           autoindex   "ON"   ;

        # CIS 5.3.1: Fails (Tests missing quotes, missing always, case-insensitivity)
        add_header     x-frame-options   SAMEORIGIN   ;

        # CIS 5.3.2: Fails (Tests our strict ^NOSNIFF$ regex anchor against junk data)
        add_header X-Content-Type-Options "nosniff_junk" always;

        # CIS 5.3.3: Fails (Tests handling of empty/malformed policy lacking a -src directive)
        add_header CONTENT-SECURITY-POLICY " ALWAYS " ;

        # CIS 5.3.4: Passes! (Tests our ability to strip 'always' even if it's placed at the front)
        add_header Referrer-Policy "no-referrer" always;
    }
}