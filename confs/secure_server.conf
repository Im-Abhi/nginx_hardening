# /etc/nginx/conf.d/secure_server.conf

# SKIPPED FOR TESTING: CIS 4.1.1 (HTTP to HTTPS Redirect)
# server {
#     listen 80;
#     server_name cisecurity.org;
#     return 301 https://$host$request_uri;
# }

server {
    # Changed to 80 for testing. 
    # SKIPPED: CIS 4.1.13 (listen 443 ssl http2)
    listen 80;
    server_name cisecurity.org;

    # --- SKIPPED SSL/TLS CONFIGURATIONS ---
    # CIS 4.1.2: Ensure a trusted certificate and trust chain is installed
    # ssl_certificate /etc/nginx/cert.pem;
    # ssl_certificate_key /etc/nginx/nginx.key;

    # CIS 4.1.4: Ensure only modern TLS protocols are used
    # ssl_protocols TLSv1.2 TLSv1.3;

    # CIS 4.1.5: Disable weak ciphers
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;

    # CIS 4.1.6: Ensure custom Diffie-Hellman parameters are used
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # CIS 4.1.7: Ensure Online Certificate Status Protocol (OCSP) stapling is enabled
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # CIS 4.1.12: Ensure session resumption is disabled to enable perfect forward security
    # ssl_session_tickets off;
    # --------------------------------------

    # CIS 5.2.4: Ensure the number of connections per IP address is limited
    limit_conn limitperip 10;

    # CIS 4.1.8 & 5.3.1 - 5.3.4: Browser Security Headers
    # Note: Strict-Transport-Security (HSTS) is left active here, but browsers will only 
    # respect it if delivered over HTTPS. It won't break HTTP testing.
    add_header Strict-Transport-Security "max-age=15768000;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    add_header Referrer-Policy "no-referrer" always;

    # CIS 5.1.2: Ensure only approved HTTP methods are allowed (e.g., block DELETE/PUT if not needed)
    if ($request_method !~ ^(GET|HEAD|POST)$) {
        return 444;
    }

    location / {
        # CIS 5.2.5: Ensure rate limits by IP address are set
        limit_req zone=ratelimit burst=10 nodelay;

        # Example proxy configurations (if acting as a reverse proxy)
        # proxy_pass http://backend_server;
        
        # CIS 3.7: Ensure proxies pass source IP information
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # CIS 2.5.4: Ensure the NGINX reverse proxy does not enable information disclosure
        # proxy_hide_header X-Powered-By;
        # proxy_hide_header Server;
    }

    # CIS 2.5.3: Ensure hidden file serving is disabled
    location ~ /\. { 
        deny all; 
        return 404; 
    }
}