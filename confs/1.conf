# ============================================================================
# COMPREHENSIVE NGINX SECURITY AUDIT TEST CONFIGURATION
# This file contains VULNERABLE and SECURE examples for testing purposes
# ============================================================================

user root;  # VULNERABLE: Running as root
worker_processes 1;
daemon off;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # VULNERABLE: Missing security headers
    # ========================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    server_tokens on;  # VULNERABLE: Exposes nginx version

    # VULNERABLE: merge_slashes disabled allows double-slash bypass
    merge_slashes off;

    # ========================================================================
    # VULNERABLE SERVER BLOCK 1: Weak SSL/TLS Configuration
    # ========================================================================
    server {
        listen 443 ssl;
        server_name vulnerable.example.com;

        # VULNERABLE: Using weak/deprecated TLS versions
        ssl_protocols SSLv3 TLSv1 TLSv1.1 TLSv1.2;

        # VULNERABLE: Weak cipher suites
        # NEW (Still weak, but valid for testing)
        ssl_ciphers 'DES-CBC3-SHA:AES128-SHA:AES256-SHA:!aNULL:!eNULL';
        ssl_prefer_server_ciphers off;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # VULNERABLE: No HSTS header
        # VULNERABLE: No X-Frame-Options header
        # VULNERABLE: No X-Content-Type-Options header
        # VULNERABLE: No CSP header
        # VULNERABLE: No X-XSS-Protection header
        # VULNERABLE: No Referrer-Policy header

        location / {
            # VULNERABLE: CRLF injection - using $uri instead of $request_uri
            return 302 https://$host$uri;
        }

        location /files {
            # VULNERABLE: Directory traversal - alias without trailing slash
            alias /home/;
        }

        location /api {
            # VULNERABLE: No rate limiting
            # VULNERABLE: No HTTP method restriction
            proxy_pass http://backend;
        }
    }

    # ========================================================================
    # VULNERABLE SERVER BLOCK 2: Unsafe Proxy Configuration
    # ========================================================================
    server {
        listen 8080;
        server_name proxy.vulnerable.com;

        # VULNERABLE: No SSL enforcement
        # VULNERABLE: No security headers

        location / {
            # VULNERABLE: SSRF via unvalidated proxy_pass
            proxy_pass http://backend;
            # VULNERABLE: Missing security headers to backend
        }

        location ~ /dir_enum/(.*) {
            # VULNERABLE: SSRF - unvalidated regex in proxy_pass
            proxy_pass http://backend/$1;
        }

        location /api {
            # VULNERABLE: add_header override - security headers lost
            add_header X-Custom-Header "value";
            proxy_pass http://backend;
        }
    }

    # ========================================================================
    # VULNERABLE SERVER BLOCK 3: Information Disclosure
    # ========================================================================
    server {
        listen 9000;
        server_name info.vulnerable.com;

        # VULNERABLE: Autoindex enabled - directory listing
        location /uploads {
            autoindex on;
            root /var/www;
        }

        # VULNERABLE: Error pages expose information
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # VULNERABLE: No logging configured
        location /secret {
            # No access_log directive
            return 200 "Secret data";
        }
    }

    # ========================================================================
    # VULNERABLE SERVER BLOCK 4: Missing Restrictions
    # ========================================================================
    server {
        listen 3000;
        server_name unrestricted.vulnerable.com;

        # VULNERABLE: No HTTP method restrictions
        location /api {
            # Allows DELETE, PUT, PATCH, etc.
            proxy_pass http://backend;
        }

        # VULNERABLE: Large client body buffer
        client_body_buffer_size 100m;

        # VULNERABLE: Proxy buffering disabled
        location /stream {
            proxy_buffering off;
            proxy_pass http://backend;
        }
    }

    # ========================================================================
    # SECURE SERVER BLOCK 1: Proper SSL/TLS Configuration
    # ========================================================================
    server {
        listen 443 ssl http2;
        server_name secure.example.com;

        # SECURE: Using only strong TLS versions
        ssl_protocols TLSv1.2 TLSv1.3;

        # SECURE: Strong cipher suites
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # SECURE: HSTS header with preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # SECURE: Clickjacking protection
        add_header X-Frame-Options "DENY" always;

        # SECURE: MIME-type sniffing protection
        add_header X-Content-Type-Options "nosniff" always;

        # SECURE: XSS protection
        add_header X-XSS-Protection "1; mode=block" always;

        # SECURE: Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        # SECURE: Referrer Policy
        add_header Referrer-Policy "no-referrer" always;

        # SECURE: Permissions Policy
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # SECURE: Hide server version
        server_tokens off;

        # SECURE: merge_slashes enabled (default)
        merge_slashes on;

        # SECURE: Proper logging
        access_log /var/log/nginx/secure_access.log main;
        error_log /var/log/nginx/secure_error.log warn;

        location / {
            # SECURE: Using $request_uri to prevent CRLF injection
            return 302 https://$host$request_uri;
        }

        location /files {
            # SECURE: alias with trailing slash
            alias /home/files/;
        }

        location /api {
            # SECURE: Rate limiting configured
            limit_req zone=api_limit burst=20 nodelay;

            # SECURE: HTTP method restriction
            if ($request_method !~ ^(GET|HEAD|POST)$) {
                return 405;
            }

            # SECURE: Proper proxy headers
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads {
            # SECURE: Autoindex disabled
            autoindex off;
            root /var/www;
        }
    }

    # ========================================================================
    # SECURE SERVER BLOCK 2: Proper Rate Limiting & DDoS Protection
    # ========================================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    server {
        listen 443 ssl http2;
        server_name api.secure.example.com;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # SECURE: Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self';" always;

        server_tokens off;

        # SECURE: Proper logging
        access_log /var/log/nginx/api_access.log main;
        error_log /var/log/nginx/api_error.log warn;

        location /api/login {
            # SECURE: Strict rate limiting on login
            limit_req zone=login_limit burst=3 nodelay;

            # SECURE: Only POST allowed
            if ($request_method != POST) {
                return 405;
            }

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/data {
            # SECURE: Rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # SECURE: Allowed methods only
            if ($request_method !~ ^(GET|HEAD|POST|PUT)$) {
                return 405;
            }

            # SECURE: Proper buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            client_body_buffer_size 1m;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ========================================================================
    # SECURE SERVER BLOCK 3: HTTP to HTTPS Redirect
    # ========================================================================
    server {
        listen 80;
        server_name secure.example.com api.secure.example.com;

        # SECURE: Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================================================
    # SECURE UPSTREAM CONFIGURATION
    # ========================================================================
    upstream backend {
        least_conn;
        server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ========================================================================
    # SECURE DEFAULT SERVER BLOCK
    # ========================================================================
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # SECURE: Deny all requests to default server
        return 444;
    }
}