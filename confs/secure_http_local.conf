# ==========================================
# Realistic Secure NGINX Test Configuration
# LOCAL TEST MODE (No TLS dependency)
# Purpose: CIS-style audit validation
# ==========================================

user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # -----------------------------
    # Basic hardening / disclosure
    # -----------------------------
    server_tokens off;
    keepalive_timeout 10;
    send_timeout 10;

    client_body_timeout 10;
    client_header_timeout 10;
    client_max_body_size 100K;
    large_client_header_buffers 2 1k;

    # -----------------------------
    # Logging
    # -----------------------------
    log_format main
        'server="$server_name" host="$host" '
        'time="$time_iso8601" '
        'src="$remote_addr:$remote_port" '
        'dst="$server_addr:$server_port" '
        'request="$request" status="$status" '
        'bytes="$body_bytes_sent" '
        'referer="$http_referer" '
        'ua="$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log info;

    # -----------------------------
    # Rate / connection limiting
    # -----------------------------
    limit_conn_zone $binary_remote_addr zone=limitperip:10m;
    limit_req_zone  $binary_remote_addr zone=ratelimit:10m rate=5r/s;

    # -----------------------------
    # MIME / defaults
    # -----------------------------
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # -----------------------------
    # Unknown host catch-all
    # -----------------------------
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 404;
    }

    # -----------------------------
    # Main secure web app
    # -----------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name example.local www.example.local;

        root /usr/share/nginx/html;
        index index.html;

        # -------------------------
        # Security headers
        # -------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self';" always;
        add_header Referrer-Policy "no-referrer" always;

        # -------------------------
        # Error pages
        # -------------------------
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        # -------------------------
        # Limits
        # -------------------------
        limit_conn limitperip 10;
        limit_req  zone=ratelimit burst=10 nodelay;

        # -------------------------
        # Hide dotfiles
        # -------------------------
        location ~ /\. {
            deny all;
            return 404;
        }

        # Allow ACME challenge if needed
        location ^~ /.well-known/acme-challenge/ {
            allow all;
            root /usr/share/nginx/html;
        }

        # -------------------------
        # Restrict methods
        # -------------------------
        if ($request_method !~ ^(GET|HEAD|POST)$) {
            return 444;
        }

        # -------------------------
        # Health endpoint
        # -------------------------
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # -------------------------
        # Static assets
        # -------------------------
        location /assets/ {
            expires 7d;
            access_log off;
            try_files $uri =404;
        }

        # -------------------------
        # Main app
        # -------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}